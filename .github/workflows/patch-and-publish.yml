name: ROS2/Webots image
run-name: patch and publish ROS2/Webots image
on: [push]
jobs:
  Build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Docker
        uses: docker/setup-docker-action@v5
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          path: patchrepo
      - name: Checkout original repo
        uses: actions/checkout@v6
        with:
          repository: "PXLAIRobotics/ROS2_Development_Environment"
          path: originalrepo
          ref: c1792f28dd3cfe8e910f2e9e230f5a54ba7b05b2
      - name: Apply patch
        run: "patch originalrepo/pxl_ros2_jazzy_vnc_image/Dockerfile patchrepo/add_webots_bridge.patch"
      - name: build
        run: "cd originalrepo/pxl_ros2_jazzy_vnc_image; sh 01_build_image.sh"
      - name: publish
        run: 'echo "TODO: publish to Docker Hub"'
